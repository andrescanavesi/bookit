<template>
    <div class="admin-container">        <div class="date-navigation">
            <button class="nav-btn" onclick={handlePrevWeek} title="Semana anterior">&lt;</button>
            <div class="date-picker-wrapper">
                <input type="date" class="date-input" value={baseDateString} onchange={handleDatePicker} />
            </div>
            <button class="nav-btn" onclick={handleNextWeek} title="Semana siguiente">&gt;</button>
        </div>

        <div class="date-selector-wrapper">
            <template for:each={weekDays} for:item="day">
                <div key={day.dateKey} class={day.cssClass} data-date={day.dateKey} onclick={handleDateSelect}>
                    <span class="ds-dow">{day.dayOfWeek}</span>
                    <span class="ds-number">{day.dayNumber}</span>
                    <span class="ds-month">{day.month}</span>
                </div>
            </template>
        </div>

        <template if:true={selectedHolidayName}>
            <div class="holiday-banner">
                <lightning-icon icon-name="utility:event" size="small" variant="inverse" class="icon-holiday"></lightning-icon>
                Feriado: <strong class="slds-m-left_xx-small">{selectedHolidayName}</strong>
            </div>
        </template>

        <div class="table-scroll-wrapper">
            <table class="matrix-table">
                <thead>
                    <tr>
                        <template for:each={gridHeaders} for:item="th">
                            <th key={th.id} class={th.cssClass}>
                                <template if:true={th.dotStyle}>
                                    <span class="prof-dot" style={th.dotStyle}></span>
                                </template>
                                {th.label}
                                <template if:true={th.statsLabel}>
                                    <br/><small style="font-weight:500; font-size:10px; color:var(--text-color); opacity:0.7;">{th.statsLabel}</small>
                                </template>
                            </th>
                        </template>
                    </tr>
                </thead>
                <tbody>
                    <template for:each={gridRows} for:item="row">
                        <tr key={row.id}>
                            <template for:each={row.cells} for:item="cell">
                                <template if:true={cell.isTimeLabel}>
                                    <td key={cell.id} class="time-label-cell">
                                        <span class="time-text">{cell.label}</span>
                                    </td>
                                </template>
                                
                                <template if:false={cell.isTimeLabel}>
                                    <td key={cell.id} class="appt-cell" style={cell.tdStyle}>
                                        
                                        <template if:true={cell.isOccupied}>
                                            <div class={cell.cssClass} style={cell.style} data-id={cell.data.id} onclick={handleApptClick}>
                                                <template if:true={cell.isStartBlock}>
                                                    <div class="appt-content-wrapper">
                                                        <div class="appt-meta">
                                                            <span class="appt-time-range">{cell.data.timeRange}</span>
                                                            <span class="appt-price">{cell.data.priceText}</span>
                                                        </div>
                                                        <div class="appt-main-info">
                                                            <span class="appt-customer">
                                                                {cell.data.customer}
                                                                <template if:true={cell.data.hasAllergies}>
                                                                    <lightning-icon icon-name="utility:warning" size="x-small" style="margin-left: 4px;" variant="error" title="Tiene alergias/condiciones"></lightning-icon>
                                                                </template>
                                                            </span>
                                                            <span class="appt-service">{cell.data.service}</span>
                                                        </div>
                                                        <div class="appt-footer">
                                                            <span class="appt-name">{cell.data.name}</span>
                                                            <div class="appt-icons">
                                                                <template if:true={cell.data.isReminderSent}>
                                                                    <lightning-icon icon-name="utility:chat" size="xx-small" class="icon-reminder" variant="inverse"></lightning-icon>
                                                                </template>
                                                                <template if:true={cell.data.isConfirmed}>
                                                                    <lightning-icon icon-name="utility:check" size="xx-small" class="icon-confirmed" variant="inverse"></lightning-icon>
                                                                </template>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>

                                        <template if:false={cell.isOccupied}>
                                            <template if:true={cell.isBlocked}>
                                                <!-- NUEVO: Dataset y OnClick dinámicos -->
                                                <div class={cell.cssClass} style={cell.blockCursor} data-type={cell.blockType} data-absid={cell.absenceId} data-time={cell.time} data-empid={cell.empId} onclick={handleBlockedClick}>
                                                    <template if:true={cell.blockLabel}>
                                                        <span class="absence-label">✕ {cell.blockLabel}</span>
                                                    </template>
                                                </div>
                                            </template>
                                            
                                            <template if:false={cell.isBlocked}>
                                                <div class={cell.cssClass} data-time={cell.time} data-empid={cell.empId} onclick={handleEmptySlotClick}>
                                                    <template if:true={cell.outsideLabel}>
                                                        <span class="outside-label">{cell.outsideLabel}</span>
                                                    </template>
                                                    <span class="add-icon">+</span>
                                                </div>
                                            </template>
                                        </template>

                                    </td>
                                </template>
                            </template>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <!-- MODAL A: CREACIÓN UNIFICADA (CITAS / BLOQUEOS) -->
        <template if:true={isCreateModalOpen}>
            <div class="modal-backdrop">
                <div class="modal-container">
                    <div class="modal-header">
                        <h2>Agendar Turno</h2>
                        <button class="modal-close-x" onclick={closeModals}>✕</button>
                    </div>
                    
                    <div class="modal-body">
                        <!-- PÍLDORAS DE NAVEGACIÓN -->
                        <div class="modal-tabs">
                            <button class={appointmentTabClass} data-tab="appointment" onclick={handleTabClick}>📅 Nueva Cita</button>
                            <button class={absenceTabClass} data-tab="absence" onclick={handleTabClick}>☕ Bloquear Horario</button>
                        </div>

                        <p class="modal-summary-text">Para <strong>{formEmpName}</strong> a las <strong>{formTimeLabel} hs</strong>.</p>
                        
                        <!-- VISTA 1: FORMULARIO DE CITA -->
                        <template if:true={isAppointmentTabActive}>
                            <div class="form-group">
                                <label>Clienta</label>
                                <c-a-a-customer-lookup 
                                    oncustomerselect={handleCustomerSelect}
                                    selected-customer-id={selectedCustomerId}
                                ></c-a-a-customer-lookup>
                            </div>

                            <div class="form-group">
                                <label>Servicio</label>
                                <select name="service" class="modal-select" onchange={handleFormChange}>
                                    <option value="">-- Seleccionar Servicio --</option>
                                    <template for:each={serviceOptions} for:item="opt">
                                        <option key={opt.value} value={opt.value}>{opt.label}</option>
                                    </template>
                                </select>
                            </div>
                        </template>

                        <!-- VISTA 2: FORMULARIO DE BLOQUEO -->
                        <template if:false={isAppointmentTabActive}>
                            <div class="form-group">
                                <label>Motivo del Bloqueo</label>
                                <select name="absenceCategory" class="modal-select" onchange={handleFormChange}>
                                    <option value="">-- Indicar Motivo --</option>
                                    <template for:each={absenceCategoryOptions} for:item="opt">
                                        <option key={opt.value} value={opt.value}>{opt.label}</option>
                                    </template>
                                </select>
                            </div>

                            <div class="form-group">
                                <label>Duración</label>
                                <select name="absenceDuration" class="modal-select" onchange={handleFormChange}>
                                    <option value="">-- Seleccionar Tiempo --</option>
                                    <template for:each={absenceDurationOptions} for:item="opt">
                                        <option key={opt.value} value={opt.value}>{opt.label}</option>
                                    </template>
                                </select>
                            </div>
                        </template>
                    </div>

                    <div class="modal-footer">
                        <button class="modal-btn modal-btn--secondary" onclick={closeModals}>Cancelar</button>
                        <button class="modal-btn modal-btn--primary" onclick={handleSaveAction} disabled={isSaving}>
                            <template if:true={isSaving}>Procesando...</template>
                            <template if:false={isSaving}>
                                <template if:true={isAppointmentTabActive}>Confirmar Reserva</template>
                                <template if:false={isAppointmentTabActive}>Aplicar Bloqueo</template>
                            </template>
                        </button>
                    </div>
                </div>
            </div>
        </template> 

        <template if:true={isDetailModalOpen}>
            <div class="modal-backdrop">
                <div class="modal-container modal-container--detail">
                    <div class="modal-header">
                        <h2>Detalle del Turno</h2>
                        <button class="modal-close-x" onclick={closeModals}>✕</button>
                    </div>
                    <div class="modal-body">
                        <div class="detail-card-header">
                            <span class="detail-status-badge">{selectedAppt.status}</span>
                            <h3>{selectedAppt.customer}</h3>
                            <p>{selectedAppt.service} · {selectedAppt.priceText}</p>
                        </div>
                        <div class="detail-info-grid">
                            <template if:false={selectedAppt.isDone}>
                                <div>
                                    <strong>Profesional:</strong>
                                    <lightning-combobox
                                        variant="label-hidden"
                                        value={selectedAppt.employeeId}
                                        options={eligibleEmployeesOptions}
                                        onchange={handleReassignChange}
                                        class="slds-m-top_xxx-small">
                                    </lightning-combobox>
                                </div>
                            </template>
                            <template if:true={selectedAppt.isDone}>
                                <p><strong>Profesional:</strong> {selectedAppt.employeeName}</p>
                            </template>
                            <p><strong>Horario:</strong> {selectedAppt.timeRange} hs</p>
                        </div>

                        <template if:true={selectedAppt.hasAllergies}>
                            <div style="background-color: #fee2e2; border-left: 4px solid #ef4444; padding: 12px; margin-top: 16px; margin-bottom: 16px; border-radius: 4px; display: flex; align-items: center;">
                                <lightning-icon icon-name="utility:warning" size="small" variant="error" style="margin-right: 12px;"></lightning-icon>
                                <span style="color: #991b1b; font-size: 14px;"><strong>Atención:</strong> El cliente indicó tener alergias a productos o condiciones especiales en la piel.</span>
                            </div>
                        </template>

                        <template if:true={selectedAppt.customerComments}>
                            <div class="form-group modal-comments-section" style="margin-top: 16px;">
                                <label style="color: #666; font-size: 12px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;">Comentarios del Cliente</label>
                                <lightning-textarea name="customerComments"
                                        variant="label-hidden"
                                        class="custom-lightning-textarea"
                                        value={selectedAppt.customerComments}
                                        disabled="true"></lightning-textarea>
                            </div>
                        </template>

                        <div class="form-group modal-comments-section" style="margin-top: 16px;">
                            <label>Comentarios Internos / Notas del Servicio</label>
                            <lightning-textarea name="internalComments"
                                    variant="label-hidden"
                                    class="custom-lightning-textarea"
                                    placeholder="Ej. Diseño Nail Art minimalista, prefiere tonos nude, cutículas sensibles..."
                                    value={tempInternalComments}
                                    onchange={handleCommentChange}
                                    disabled={selectedAppt.isDone}></lightning-textarea>
                        </div>
                    </div>

                   <div class="modal-footer modal-footer--split">
    
                        <template if:true={selectedAppt.isDone}>
                            <div>
                                <span class="badge-completed-status">✓ Cita Realizada</span>
                            </div>
                            <div class="modal-footer-right">
                                <button class="modal-btn modal-btn--secondary" onclick={closeModals}>Cerrar</button>
                            </div>
                        </template>

                        <template if:false={selectedAppt.isDone}>
                            <div class="modal-footer-left">
                                <button class="modal-btn modal-btn--danger" onclick={handleCancelAction} disabled={isCancelling}>
                                    <template if:true={isCancelling}>Cancelando...</template>
                                    <template if:false={isCancelling}>✕ Cancelar</template>
                                </button>
                                <template if:true={selectedAppt.isPast}>
                                    <button class="modal-btn modal-btn--noshow" onclick={handleNoShowAction} disabled={isNoShowing} style="margin-left: 8px;">
                                        <template if:true={isNoShowing}>Cargando...</template>
                                        <template if:false={isNoShowing}>No Show</template>
                                    </button>
                                </template>
                            </div>

                            <div class="modal-footer-right">
                                <a if:true={selectedAppt.waLink} href={selectedAppt.waLink} target="_blank" class={selectedAppt.waButtonClass} onclick={handleWaAction} style="text-decoration: none;">
                                    💬 {selectedAppt.waButtonLabel}
                                </a>

                                <template if:true={selectedAppt.isPending}>
                                    <button class="modal-btn modal-btn--primary" onclick={handleConfirmAction} disabled={isConfirming}>
                                        <template if:true={isConfirming}>Cargando...</template>
                                        <template if:false={isConfirming}>✓ Confirmar</template>
                                    </button>
                                </template>
                                <template if:false={selectedAppt.isPending}>
                                    <button class="modal-btn modal-btn--success" onclick={handleDoneAction} disabled={isCompleting}>
                                        <template if:true={isCompleting}>Cargando...</template>
                                        <template if:false={isCompleting}>✓ Atendido</template>
                                    </button>
                                </template>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </template>
    
    <!-- MODAL C: LIBERAR BLOQUEO -->
        <template if:true={isAbsenceModalOpen}>
            <div class="modal-backdrop">
                <div class="modal-container">
                    <div class="modal-header">
                        <h2>Liberar Horario</h2>
                        <button class="modal-close-x" onclick={closeModals}>✕</button>
                    </div>
                    <div class="modal-body">
                        <p class="modal-summary-text">Estás a punto de liberar el espacio de <strong>{selectedBlock.time} hs</strong> para <strong>{selectedBlock.empName}</strong>.</p>
                        <p style="font-size: 14px; color: var(--text-main);">Al confirmar, este bloque quedará disponible en la agenda para recibir citas.</p>
                    </div>
                    <div class="modal-footer">
                        <button class="modal-btn modal-btn--secondary" onclick={closeModals}>Mantener Bloqueado</button>
                        <button class="modal-btn modal-btn--primary" onclick={handleFreeSlot} disabled={isSaving}>
                            <template if:true={isSaving}>Liberando...</template>
                            <template if:false={isSaving}>Confirmar y Liberar</template>
                        </button>
                    </div>
                </div>
            </div>
        </template>
         
    </div>
</template>
