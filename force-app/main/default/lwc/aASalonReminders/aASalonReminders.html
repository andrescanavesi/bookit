<template>
    <div class="reminders-container">
        
        <!-- TABS -->
        <div class="tabs-container">
            <template for:each={tabs} for:item="tab">
                <button key={tab.id} 
                        class={tab.cssClass} 
                        data-id={tab.id} 
                        onclick={handleTabChange}>
                    {tab.label}
                    <template if:true={tab.showBadge}>
                        <span class="tab-badge">{tab.count}</span>
                    </template>
                </button>
            </template>
        </div>

        <!-- TABLE HEADER -->
        <div class="table-header-container">
            <table class="reminders-table">
                <thead>
                    <tr>
                        <th class="col-id">ID</th>
                        <th class="col-name">NOMBRE</th>
                        <th class="col-phone">CELULAR</th>
                        <th class="col-datetime">FECHA</th>
                        <th class="col-service">SERVICIO</th>
                        <template if:true={isPendingPaymentsTab}>
                            <th class="col-amount">MONTO</th>
                        </template>
                        <th class="col-action">ACCIÓN</th>
                    </tr>
                </thead>
            </table>
        </div>

        <!-- TABLE BODY -->
        <div class="table-scroll-container">
            <table class="reminders-table">
                <tbody>
                    <template if:false={hasData}>
                        <tr>
                            <td colspan="4" class="no-data-msg">No hay citas en esta sección.</td>
                        </tr>
                    </template>
                    <template for:each={currentData} for:item="appt">
                        <tr key={appt.Id}>
                            <td class="col-id">
                                <span class="id-text">{appt.apptName}</span>
                            </td>
                            <td class="col-name">
                                <div class="name-cell">
                                    <span class="full-name">{appt.fullName}</span>
                                </div>
                            </td>
                            <td class="col-phone">
                                <span class="phone-text">{appt.Phone_Number__c}</span>
                            </td>
                            <td class="col-datetime">
                                <span class="datetime-text">{appt.formattedDateTime}</span>
                            </td>
                            <td class="col-service">
                                <span class="service-text">{appt.serviceName}</span>
                            </td>
                            <template if:true={isPendingPaymentsTab}>
                                <td class="col-amount">
                                    <span class="service-text">{appt.amountText}</span>
                                </td>
                            </template>
                            <td class="col-action">
                                <template if:false={isAwaitingTab}>
                                    <div class="action-buttons">
                                        <lightning-button-icon icon-name="utility:chat" variant="bare" alternative-text="Enviar WhatsApp" data-id={appt.Id} data-phone={appt.Phone_Number__c} data-message={appt.whatsappMessage} onclick={handleWhatsAppClick} class="wa-icon-btn" size="large"></lightning-button-icon>
                                        <lightning-button-icon icon-name="utility:preview" variant="bare" alternative-text="Previsualizar mensaje" data-message={appt.whatsappMessage} onclick={openPreview} class="preview-icon-btn" size="large"></lightning-button-icon>
                                        <template if:true={isPendingPaymentsTab}>
                                            <lightning-button-icon icon-name="utility:moneybag" variant="bare" alternative-text="Marcar como pago" data-id={appt.Id} onclick={handleMarkAsPaid} class="pay-icon-btn" size="large"></lightning-button-icon>
                                        </template>
                                    </div>
                                </template>
                                <template if:true={isAwaitingTab}>
                                    <button class="btn-confirm" data-id={appt.Id} onclick={handleConfirmClick}>
                                        Confirmar
                                    </button>
                                </template>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
        
        <!-- MODAL DE VISTA PREVIA -->
        <template if:true={isModalOpen}>
            <section role="dialog" tabindex="-1" aria-labelledby="modal-heading" aria-modal="true" class="slds-modal slds-fade-in-open custom-modal">
                <div class="slds-modal__container">
                    <header class="slds-modal__header custom-modal-header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Cerrar" onclick={closeModal}>
                            <lightning-icon icon-name="utility:close" alternative-text="close" variant="inverse" size="small"></lightning-icon>
                            <span class="slds-assistive-text">Cerrar</span>
                        </button>
                        <h2 id="modal-heading" class="slds-modal__title slds-hyphenate">Vista previa del mensaje</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium custom-modal-body">
                        <div class="preview-text-container">
                            <lightning-formatted-text value={previewMessage} linkify></lightning-formatted-text>
                        </div>
                    </div>
                    <footer class="slds-modal__footer custom-modal-footer">
                        <button class="btn-secondary" onclick={closeModal}>Cancelar</button>
                        <button class="btn-primary" onclick={copyToClipboard}>Copiar al Portapapeles</button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
        
    </div>
</template>
