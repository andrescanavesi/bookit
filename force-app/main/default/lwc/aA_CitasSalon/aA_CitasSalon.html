<template>
    <div class="admin-container">
        
        <div class="header">
            <span class="header__eyebrow">PANEL DEL EQUIPO</span>
            <h1 class="header__title">Agenda</h1>
        </div>

        <template if:true={isLoading}>
            <div style="text-align:center; padding: 40px;">Cargando agenda...</div>
        </template>

        <template if:false={isLoading}>
            <template if:true={isAdmin}>
                <div class="filter-section">
                    <span class="filter-label">VER AGENDA DE</span>
                    <div class="pills-scroll">
                        <template for:each={employeePills} for:item="pill">
                            <button key={pill.id} class={pill.cssClass} data-id={pill.id} onclick={handleEmployeeSelect}>
                                <template if:false={pill.isAll}>
                                    <span class="prof-dot" style={pill.style}></span>
                                </template>
                                {pill.label}
                            </button>
                        </template>
                    </div>
                </div>
            </template>

            <div class="tabs-container">
                <div class="tabs-row">
                    <template for:each={tabs} for:item="tab">
                        <button key={tab.id} class={tab.cssClass} data-id={tab.id} onclick={handleTabSelect}>
                            {tab.label}
                        </button>
                    </template>
                </div>
                <button class="btn-refresh">↻</button>
            </div>

            <div class="agenda-content">
                
                <template if:true={hasData}>
                    <template for:each={groupedAppointments} for:item="group">
                        <div key={group.dateHeader} class="date-group">
                            <h2 class="date-header">{group.dateHeader}</h2>
                            
                            <template for:each={group.appointments} for:item="appt">
                                <div key={appt.Id} class="appt-card" style={appt.cardStyle}>
                                    
                                    <div class="appt-card__top">
                                        <span class="time">{appt.horaStr}</span>
                                        <div class="badges">
                                            <span class="emp-badge">{appt.employeeName}</span>
                                            <span class={appt.statusClass}>{appt.statusLabel}</span>
                                        </div>
                                    </div>
                                    
                                    <h3 class="customer-name">{appt.customerName}</h3>
                                    <p class="service-desc">{appt.serviceName} · {appt.duration} min</p>
                                    
                                    <div class="contact-info">
                                        📞 {appt.phone}
                                    </div>
                                    
                                    </div>
                            </template>
                        </div>
                    </template>
                </template>

                <template if:false={hasData}>
                    <div class="empty-state">
                        Día sin turnos para {selectedEmployeeId === 'ALL' ? 'todo el equipo' : 'el empleado seleccionado'}.
                    </div>
                </template>

            </div>
        </template>
    </div>
</template>
